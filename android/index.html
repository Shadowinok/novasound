<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>NovaSound — AI Music</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=18" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <!-- REG.RU: явный API на Render (обходит ошибочный VITE_API_URL в билде). Другой домен — вручную: window.NOVASOUND_API_BASE -->
  <script>
    (function () {
      try {
        var h = location.hostname;
        if (/^([\w-]+\.)*novasoundapp\.ru$/.test(h)) {
          window.NOVASOUND_API_BASE = 'https://novasound-api.onrender.com/api';
        }
      } catch (e) {}
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
